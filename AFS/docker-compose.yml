version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: afs_db
    environment:
      POSTGRES_DB: faculty_scheduling
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afs_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: afs_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "your-secret-key"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/faculty_scheduling"
      DATABASE_ENGINE: "django.db.backends.postgresql"
      DATABASE_NAME: "faculty_scheduling"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "postgres"
      DATABASE_HOST: "db"
      DATABASE_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  celery:
    build: .
    container_name: afs_celery
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/faculty_scheduling"
      DATABASE_ENGINE: "django.db.backends.postgresql"
      DATABASE_NAME: "faculty_scheduling"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "postgres"
      DATABASE_HOST: "db"
      DATABASE_PORT: "5432"
    depends_on:
      - db
      - redis
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
